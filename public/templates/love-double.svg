<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 672 1072" width="100%" height="100%">
  <defs>
    <!-- Metallic Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" />
      <stop offset="25%" stop-color="#fff9e6" />
      <stop offset="50%" stop-color="#aa771c" />
      <stop offset="75%" stop-color="#f5e1a4" />
      <stop offset="100%" stop-color="#8a5a00" />
    </linearGradient>
    
    <!-- Shadow filter for cutouts -->
    <filter id="shadow-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset dx="1" dy="3" />
      <feGaussianBlur stdDeviation="4" />
    </filter>
  </defs>

  <!-- Pastel Pink Card Background with two cutouts -->
  <path d="M 0,0 L 672,0 L 672,1072 L 0,1072 Z M 67.2,214.4 L 67.2,804 L 322.56,804 L 322.56,214.4 Z M 349.44,214.4 L 349.44,804 L 604.8,804 L 604.8,214.4 Z" fill="#fff1f2" fill-rule="evenodd" />

  <!-- Gold border for Slot 1 -->
  <rect x="67.2" y="214.4" width="255.36" height="589.6" fill="none" stroke="url(#gold-grad)" stroke-width="4" rx="2" />
  <!-- Shadow overlay for Slot 1 -->
  <rect x="67.2" y="214.4" width="255.36" height="589.6" fill="none" stroke="#000000" stroke-width="3" opacity="0.15" filter="url(#shadow-blur)" />

  <!-- Gold border for Slot 2 -->
  <rect x="349.44" y="214.4" width="255.36" height="589.6" fill="none" stroke="url(#gold-grad)" stroke-width="4" rx="2" />
  <!-- Shadow overlay for Slot 2 -->
  <rect x="349.44" y="214.4" width="255.36" height="589.6" fill="none" stroke="#000000" stroke-width="3" opacity="0.15" filter="url(#shadow-blur)" />

  <!-- Elegant Gold Hearts between the slots -->
  <path d="M 336,480 C 336,480 327,471 327,462 C 327,453 336,447 336,447 C 336,447 345,453 345,462 C 345,471 336,480 336,480 Z" fill="url(#gold-grad)" />
  <path d="M 336,515 C 336,515 329,507 329,499 C 329,491 336,486 336,486 C 336,486 343,491 343,499 C 343,507 336,515 336,515 Z" fill="url(#gold-grad)" opacity="0.8" />

  <!-- Gold cursive text caption -->
  <text x="336" y="920" text-anchor="middle" font-family="'Caveat', 'Dancing Script', 'Brush Script MT', 'Snell Roundhand', cursive" font-size="76" fill="url(#gold-grad)" font-weight="bold">Together</text>

  <!-- Tagline below cursive -->
  <text x="336" y="975" text-anchor="middle" font-family="'Inter', 'Arial', sans-serif" font-size="16" fill="#b49354" letter-spacing="6" font-weight="500">FOREVER &amp; ALWAYS</text>
</svg>
